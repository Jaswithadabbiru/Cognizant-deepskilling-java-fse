<h1>{{ portalName }}</h1>

<p *ngIf="isPortalActive">
  Portal Status: Active
</p>

<p>
  Courses Available: {{ coursesCount }}
</p>

<input
  type="text"
  [(ngModel)]="searchTerm"
  placeholder="Search courses">

<p>Searching for: {{ searchTerm }}</p>

<button (click)="onEnrollClick()">
  Enroll
</button>

<p>{{ message }}</p>

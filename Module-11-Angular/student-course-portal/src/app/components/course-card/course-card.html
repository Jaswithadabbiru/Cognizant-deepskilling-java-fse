<div
  appHighlight
  [ngClass]="cardClasses"
  [ngStyle]="{
    'border-left':
      course.gradeStatus === 'passed'
        ? '5px solid green'
        : course.gradeStatus === 'failed'
        ? '5px solid red'
        : '5px solid gray'
  }"
>

  <h3>{{ course.name }}</h3>

  <p>Credits: {{ course.credits | credit }}</p>

  <div [ngSwitch]="course.gradeStatus">

    <span *ngSwitchCase="'passed'">
      Passed
    </span>

    <span *ngSwitchCase="'failed'">
      Failed
    </span>

    <span *ngSwitchDefault>
      Pending
    </span>

  </div>

  <br>

  <button (click)="toggleEnroll()">
    {{ enrolled ? 'Unenroll' : 'Enroll' }}
  </button>

  <button (click)="toggleDetails()">
    Show Details
  </button>

  <button (click)="viewDetails()">
    View Details
  </button>

  <div *ngIf="isExpanded">

    <p>Course ID: {{ course.id }}</p>
    <p>Course Code: {{ course.code }}</p>

  </div>

</div>
